name: Commit Bot

on:
  schedule:
    # Ejecuta diariamente a diferentes horas (a las 6am, 2pm y 10pm UTC aprox)
    - cron: '17 6 * * *'
    - cron: '42 14 * * *'
    - cron: '23 22 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'logs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure git
        run: |
          git config --global user.email "qfedericoba@gmail.com"
          git config --global user.name "FedericoQuinones"

      - name: Run commit bot
        env:
          FORCE_COMMIT: ${{ github.event_name != 'schedule' && '1' || '0' }}
        run: python scripts/commit_bot.py

      - name: Push changes
        run: |
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git push
          else
            echo "No new commits to push"
          fi
