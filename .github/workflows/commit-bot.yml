name: Commit Bot

on:
  schedule:
    # Ejecuta diariamente a diferentes horas (a las 6am, 2pm y 10pm UTC aprox)
    - cron: '17 6 * * *'
    - cron: '42 14 * * *'
    - cron: '23 22 * * *'

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure git
        run: |
          git config --global user.email "alternatingcurrentgaming@gmail.com"
          git config --global user.name "Commit Bot"

      - name: Run commit bot
        run: python scripts/commit_bot.py

      - name: Push changes
        run: |
          if git diff --quiet; then
            echo "No changes to push"
          else
            git push
          fi
